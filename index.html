<script>
function generate() {
  const keyword = document.getElementById("keyword").value.trim();

  if (!keyword) {
    alert("キーワードを入れてください");
    return;
  }

  const affiliateId = "52355b8c.b0edee2c.52355b8d";

  // 👇 エンコードはキーワードだけ
  const rakutenSearchUrl =
    "https://search.rakuten.co.jp/search/mall/" +
    encodeURIComponent(keyword);

  // 👇 ここ重要：pcはエンコードしない
  const searchUrl =
    "https://hb.afl.rakuten.co.jp/hgc/" +
    affiliateId +
    "/?pc=" +
    rakutenSearchUrl;

  const post = `${keyword}、今これ系が当たり！！

楽天で見てたけど
この価格帯ほんとハズレ少ない

ランキングでまとめてみました
→ ${searchUrl}

※PR`;

  document.getElementById("result").innerHTML = `
    <textarea id="postText"></textarea>
    <button onclick="copyPost()">コピー</button>
  `;

  document.getElementById("postText").value = post;
}

function copyPost() {
  const textarea = document.getElementById("postText");
  textarea.select();
  textarea.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("コピーした！");
}
</script>
