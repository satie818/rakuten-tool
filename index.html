<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽天売れ筋 → 投稿生成</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px 16px 40px;
      color: #111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      line-height: 1.3;
      margin: 0 0 20px;
      font-weight: 800;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ddd;
      border-radius: 12px;
      margin-bottom: 14px;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: #111;
      color: #fff;
      cursor: pointer;
      margin-bottom: 18px;
    }

    .copy-btn {
      background: #e9e9e9;
      color: #111;
      margin-top: 12px;
      margin-bottom: 0;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      min-height: 240px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.8;
      border: 1px solid #ddd;
      border-radius: 12px;
      resize: vertical;
      background: #fff;
    }

    .link-box {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>楽天売れ筋 → 投稿生成</h1>

    <input id="keyword" placeholder="例：イヤホン">
    <button onclick="generatePost()">投稿を作る</button>

    <div id="result"></div>
  </div>

  <script>
    function generatePost() {
      const keyword = document.getElementById("keyword").value.trim();

      if (!keyword) {
        alert("キーワードを入れてください");
        return;
      }

      const affiliateId = "52355b8c.b0edee2c.52355b8d";
      const rakutenUrl = "https://search.rakuten.co.jp/search/mall/" + encodeURIComponent(keyword);
      const affiliateUrl = "https://hb.afl.rakuten.co.jp/hgc/" + affiliateId + "/?pc=" + rakutenUrl;

      const post =
`${keyword}、今これ系が当たり！！

楽天で見てたけど
この価格帯ほんとハズレ少ない

ランキングでまとめてみました👇
${affiliateUrl}

※PR`;

      document.getElementById("result").innerHTML =
        '<textarea id="postText"></textarea>' +
        '<button class="copy-btn" onclick="copyPost()">コピー</button>' +
        '<div class="link-box">' + affiliateUrl + '</div>';

      document.getElementById("postText").value = post;
    }

    function copyPost() {
      const textarea = document.getElementById("postText");
      textarea.focus();
      textarea.select();
      textarea.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("コピーしました！");
    }
  </script>
</body>
</html>
