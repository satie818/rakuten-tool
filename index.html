<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楽天売れ筋 → 投稿生成</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px 16px 40px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    a {
      display: block;
      margin-top: 10px;
      color: blue;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>楽天売れ筋 → 投稿生成</h1>

    <input id="keyword" placeholder="例：イヤホン">
    <button onclick="generate()">投稿を作る</button>

    <div id="result"></div>
  </div>

  <script>
    function generate() {
      const keyword = document.getElementById("keyword").value;

      if (!keyword) {
        alert("キーワード入れてください");
        return;
      }

      // 🔥 あなたのアフィリエイトID
      const affiliateId = "52355b8c.b0edee2c.52355b8d.0bec1f43";

      const searchUrl =
        "https://hb.afl.rakuten.co.jp/hgc/" +
        affiliateId +
        "/?pc=" +
        encodeURIComponent("https://search.rakuten.co.jp/search/mall/" + keyword + "/");

      const post = `これ今めちゃ売れてる

楽天ランキング上位のこれ
普通にコスパいい

・価格：商品ページ参照
・ポイント：商品ページ参照
・レビュー：商品ページ参照

→ ${searchUrl}`;

      document.getElementById("result").innerHTML = `
        <textarea id="post">${post}</textarea>
        <button onclick="copy()">コピー</button>
        <a href="${searchUrl}" target="_blank">楽天で見る</a>
      `;
    }

    function copy() {
      const text = document.getElementById("post");
      text.select();
      document.execCommand("copy");
      alert("コピーしました");
    }
  </script>
</body>
</html>
