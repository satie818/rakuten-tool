<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>楽天売れ筋 → 投稿生成</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px 16px 40px;
      color: #111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 800;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 14px;
      border: none;
      background: #111;
      color: #fff;
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      line-height: 1.8;
      box-sizing: border-box;
    }

    .copy-btn {
      background: #e9e9e9;
      color: #111;
      margin-top: 10px;
    }

    .link-box {
      margin-top: 12px;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>楽天売れ筋 → 投稿生成</h1>

    <input id="keyword" placeholder="例：イヤホン" />
    <button onclick="generate()">投稿を作る</button>

    <div id="result"></div>

  </div>

  <script>
    function generate() {
      const keyword = document.getElementById("keyword").value.trim();

      if (!keyword) {
        alert("キーワードを入れてください");
        return;
      }

      // 短縮版アフィID
      const affiliateId = "52355b8c.b0edee2c.52355b8d";

      // キーワードのみエンコード
      const encodedKeyword = encodeURIComponent(keyword);

      // 楽天検索URL（ここはそのまま使う＝短くなる）
      const rakutenUrl =
        "https://search.rakuten.co.jp/search/mall/" + encodedKeyword;

      // アフィリンク（pcはエンコードしない）
      const affiliateUrl =
        "https://hb.afl.rakuten.co.jp/hgc/" +
        affiliateId +
        "/?pc=" +
        rakutenUrl;

      const post = `${keyword}、今これ系が当たり！！

楽天で見てたけど
この価格帯ほんとハズレ少ない

ランキングでまとめてみました👇
${affiliateUrl}

※PR`;

      document.getElementById("result").innerHTML = `
        <textarea id="postText"></textarea>
        <button class="copy-btn" onclick="copyPost()">コピー</button>
        <div class="link-box">${affiliateUrl}</div>
      `;

      document.getElementById("postText").value = post;
    }

    function copyPost() {
      const textarea = document.getElementById("postText");
      textarea.select();
      textarea.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("コピーしました！");
    }
  </script>

</body>
</html>
