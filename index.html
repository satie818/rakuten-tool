<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楽天売れ筋 → 投稿生成</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px 16px 40px;
      color: #111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 14px;
      border: none;
      background: #e9e9e9;
      margin-bottom: 18px;
    }

    .copy-btn {
      background: #111;
      color: #fff;
      font-size: 18px;
      margin-top: 12px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      line-height: 1.8;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>楽天売れ筋 → 投稿生成</h1>

    <input id="keyword" placeholder="例：イヤホン" />
    <button onclick="generate()">投稿を作る</button>

    <div id="result"></div>

  </div>

  <script>
    function generate() {
      const keyword = document.getElementById("keyword").value.trim();

      if (!keyword) {
        alert("キーワードを入れてください");
        return;
      }

      const affiliateId = "52355b8c.b0edee2c.52355b8d.0bec1f43";

      const searchUrl =
        "https://hb.afl.rakuten.co.jp/hgc/" +
        affiliateId +
        "/?pc=" +
        "https://search.rakuten.co.jp/search/mall/" + keyword + "/";

      const post = `${keyword}、今これ系が当たり！！

楽天で見てたけど
この価格帯ほんとハズレ少ない

一回見てみると分かる
→ ${searchUrl}`;

      document.getElementById("result").innerHTML = `
        <textarea id="postText">${post}</textarea>
        <button class="copy-btn" onclick="copyPost()">投稿文をコピー</button>
      `;
    }

    function copyPost() {
      const text = document.getElementById("postText").value;
      navigator.clipboard.writeText(text);
      alert("コピーしました！");
    }
  </script>

</body>
</html>
